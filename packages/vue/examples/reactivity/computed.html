<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="p1"></div>
      <div id="p2"></div>
    </div>
    <script>
      const { computed, effect,reactive } = Vue
      const obj=reactive({
        name:'小李'
      })
      const computedObj = computed(()=>{
        return '姓名' + obj.name
      })
      effect(() => {
        document.querySelector('#p1').innerText = computedObj.value
      })
      effect(() => {
        document.querySelector('#p2').innerText = computedObj.value
      })
      setTimeout(() => {
        obj.name = '喝喝'
      }, 2000)
    </script>
  </body>
</html>
