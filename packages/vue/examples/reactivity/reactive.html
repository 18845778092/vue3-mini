<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="p1"></div>
      <div id="p2"></div>
    </div>
    <script>
      const { reactive,effect } = Vue
      const proxy = reactive({
        name: 'xiaoli'
      })
      console.log(proxy)
      effect(()=>{
        document.querySelector('#p1').innerText=proxy.name
      })
      effect(()=>{
        document.querySelector('#p2').innerText=proxy.name
      })
      setTimeout(()=>{
        proxy.name='喝喝'
      },2000)
    </script>
  </body>
</html>
