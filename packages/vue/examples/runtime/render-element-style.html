<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // style测试 第二次更新必须有style
      const { h, render } = Vue

      const vnode = h(
        'div',
        {
          class: 'test',
          style: {
            fontSize: '40px',
            color: 'red'
          }
        },
        'hello render'
      )

      render(vnode, document.querySelector('#app'))

      setTimeout(() => {
        render(
          h(
            'div',
            {
              class: 'test',
              style: {
                color: 'blue'
              }
            },
            'hello render'
          ),
          document.querySelector('#app')
        )
      }, 2000)
    </script>
  </body>
</html>
