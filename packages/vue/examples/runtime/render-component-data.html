<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // 有状态组件基础挂载
      const { h, render } = Vue
      const component = {
        data() {
          return {
            msg: 'hello xixi'
          }
        },
        render() {
          return h(
            'div',
            {
              class: {
                red: true
              }
            },
            this.msg
          )
        }
      }
      const vnode = h(component)
      render(vnode, document.querySelector('#app'))

      setTimeout(() => {
        const component2 = {
          data() {
            return {
              msg: 'hello....'
            }
          },
          render() {
            return h(
              'div',
              {
                class: {
                  blue: true
                }
              },
              this.msg + 1
            )
          }
        }
        const vnode2 = h(component2)
        render(vnode2, document.querySelector('#app'))
      }, 2000)
      console.log(vnode)
    </script>
  </body>
</html>
