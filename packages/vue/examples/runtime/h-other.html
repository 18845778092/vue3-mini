<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { h, Text, Comment, Fragment } = Vue
      console.log(Text)
      const VText = h(Text, '这是一个Text')
      console.log(VText)

      console.log(Comment)
      const VComment= h(Comment, '这是一个注释')
      console.log(VComment)

      console.log(Fragment)
      const VFragment = h(Fragment, '这是一个Fragment')
      console.log(VFragment)
    </script>
  </body>
</html>
